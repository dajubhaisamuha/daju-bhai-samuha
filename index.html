<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>दाजुभाइ समूह</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;
  --card:#111111;
  --card2:#1a1a1a;
  --border:#2a2a2a;
  --text:#f5f5f5;
  --text2:#888;
  --gold:#f59e0b;
  --gold2:#fbbf24;
  --green:#22c55e;
  --green2:#16a34a;
  --red:#ef4444;
  --blue:#3b82f6;
  --purple:#8b5cf6;
  --input:#1a1a1a;
  --shadow:0 8px 32px rgba(0,0,0,0.5);
  --shadow2:0 4px 16px rgba(0,0,0,0.3);
  --radius:16px;
  --radius2:12px;
}
body{
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* ===== ANIMATED BACKGROUND ===== */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(34,197,94,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(245,158,11,0.05) 0%, transparent 50%);
  pointer-events:none !important;
  z-index:-1;
  animation:bgPulse 8s ease-in-out infinite alternate;
}
@keyframes bgPulse{
  0%{opacity:0.5}
  100%{opacity:1}
}

/* ===== ANIMATIONS ===== */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 10px rgba(245,158,11,0.3)}50%{box-shadow:0 0 25px rgba(245,158,11,0.6)}}

.fadeUp{animation:fadeUp 0.35s cubic-bezier(.2,.8,.2,1) both}
.fadeIn{animation:fadeIn 0.3s ease both}

/* ===== LOADING ===== */
#loading{
  position:fixed;inset:0;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:20px;z-index:9999;
}
#loading img{
  width:100px;height:100px;border-radius:50%;
  border:3px solid var(--gold);
  animation:spin 2s linear infinite;
  box-shadow:0 0 30px rgba(245,158,11,0.4);
}
#loading p{color:var(--gold);font-weight:600;font-size:14px;letter-spacing:1px}

/* ===== LOGIN ===== */
#loginPage{
  display:none;min-height:100vh;
  align-items:center;justify-content:center;
  padding:20px;position:relative;z-index:1;
}
.loginCard{
  background:linear-gradient(145deg,#111,#1a1a1a);
  border:1px solid #2a2a2a;
  border-radius:24px;padding:40px 32px;
  width:100%;max-width:400px;
  box-shadow:0 25px 80px rgba(0,0,0,0.8);
  animation:fadeUp 0.5s cubic-bezier(.2,.8,.2,1);
}
.loginLogo{text-align:center;margin-bottom:28px}
.loginLogo img{
  width:90px;height:90px;border-radius:50%;
  border:3px solid var(--gold);
  box-shadow:0 0 30px rgba(245,158,11,0.3);
  object-fit:cover;
}
.loginLogo h1{font-size:22px;font-weight:800;color:var(--gold);margin-top:12px;letter-spacing:.5px}
.loginLogo p{font-size:12px;color:var(--text2);margin-top:4px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.8px}
.field input,.field select,.field textarea{
  width:100%;background:var(--input);
  border:1.5px solid var(--border);
  border-radius:12px;padding:12px 16px;
  font-size:14px;color:var(--text);
  font-family:'Poppins',sans-serif;
  outline:none;transition:all 0.2s;
}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(245,158,11,0.1);
}
.field select option{background:#1a1a1a}
.errBox{
  background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);
  color:#f87171;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:14px;
}
.btnPrimary{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#000;border:none;padding:14px 24px;border-radius:12px;
  font-weight:800;font-size:14px;width:100%;
  transition:all 0.2s;font-family:'Poppins',sans-serif;
  letter-spacing:.5px;
}
.btnPrimary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(245,158,11,0.4)}
.btnPrimary:active{transform:translateY(0)}
.forgotLink{text-align:center;margin-top:14px}
.forgotLink a{font-size:12px;color:var(--gold);font-weight:600;text-decoration:none}

/* ===== APP SHELL ===== */
#app{display:none;height:100vh;overflow:hidden;position:relative;z-index:1}
.shell{display:flex;height:100vh;position:relative;z-index:1}

/* ===== SIDEBAR ===== */
.sidebar{
  width:240px;
  background:#0d0d0d;
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;
  transition:all 0.3s cubic-bezier(.2,.8,.2,1);
  overflow-y:auto;overflow-x:hidden;
}
.sideHead{
  display:flex;align-items:center;gap:12px;
  padding:20px 16px;border-bottom:1px solid var(--border);
  cursor:pointer;
}
.sideHead img{
  width:44px;height:44px;border-radius:50%;
  border:2px solid var(--gold);object-fit:cover;
  flex-shrink:0;box-shadow:0 0 12px rgba(245,158,11,0.3);
}
.sideHead .appName{font-size:13px;font-weight:800;color:var(--gold)}
.sideHead .appSub{font-size:10px;color:var(--green);font-weight:600;margin-top:2px}
.sideSection{padding:12px 16px 4px;font-size:9px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:1.2px}
.navLink{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;cursor:pointer;
  color:var(--text2);font-size:13px;font-weight:500;
  border-left:3px solid transparent;
  transition:all 0.2s;margin:1px 8px;
  border-radius:10px;
  -webkit-tap-highlight-color:rgba(245,158,11,0.2);
  user-select:none;
}
.navLink:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.navLink.active{
  background:linear-gradient(135deg,rgba(245,158,11,0.12),rgba(34,197,94,0.06));
  color:var(--gold);border-left:3px solid var(--gold);
  margin:1px 8px;border-radius:10px;
}
.navIcon{font-size:18px;width:24px;text-align:center;flex-shrink:0}
.navBadge{
  background:var(--red);color:#fff;font-size:9px;
  font-weight:800;border-radius:10px;padding:2px 6px;
  min-width:16px;text-align:center;margin-left:auto;
}
.sideUser{
  display:flex;align-items:center;gap:10px;
  padding:12px;margin:8px;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);border-radius:12px;
}
.avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--green));
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:12px;color:#000;flex-shrink:0;
  overflow:hidden;
}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.sideUser .uname{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sideUser .urole{font-size:10px;color:var(--gold);font-weight:600}
.logoutBtn{
  background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);
  color:#f87171;padding:6px 10px;border-radius:8px;font-size:14px;
  margin-left:auto;flex-shrink:0;transition:all 0.2s;
}
.logoutBtn:hover{background:rgba(239,68,68,0.2)}

/* ===== MAIN ===== */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 20px;
  background:#0a0a0a;
  border-bottom:1px solid var(--border);
  flex-shrink:0;gap:12px;
}
.greeting .g1{font-weight:800;font-size:15px;color:var(--text)}
.greeting .g2{font-size:11px;color:var(--text2);margin-top:1px}
.greeting .g3{font-size:10px;color:var(--green);font-weight:600;margin-top:1px}
.topActions{display:flex;align-items:center;gap:8px}
.iconBtn{
  background:var(--card2);border:1px solid var(--border);
  color:var(--text);padding:8px 12px;border-radius:10px;
  font-size:16px;position:relative;transition:all 0.2s;
}
.iconBtn:hover{border-color:var(--gold);color:var(--gold)}
.badge{
  position:absolute;top:-4px;right:-4px;
  background:var(--red);color:#fff;font-size:9px;
  font-weight:800;border-radius:50%;width:18px;height:18px;
  display:flex;align-items:center;justify-content:center;
}
.content{flex:1;overflow-y:auto;padding:20px;overflow-x:hidden}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
.pageTitle{
  font-size:20px;font-weight:900;color:var(--text);
  margin-bottom:20px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);padding-bottom:14px;
}
.pageTitle span{font-size:24px}

/* ===== STATS GRID ===== */
.statsGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.statCard{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;
  display:flex;flex-direction:column;gap:8px;
  transition:all 0.3s cubic-bezier(.2,.8,.2,1);
  position:relative;overflow:hidden;cursor:default;
  animation:fadeUp 0.4s cubic-bezier(.2,.8,.2,1) both;
}
.statCard::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold),var(--green));
  opacity:0;transition:opacity 0.3s;
}
.statCard:hover{
  transform:translateY(-4px) scale(1.02);
  box-shadow:0 16px 40px rgba(0,0,0,0.5);
  border-color:rgba(245,158,11,0.3);
}
.statCard:hover::before{opacity:1}
.sIcon{font-size:24px}
.sVal{font-size:20px;font-weight:900}
.sLabel{font-size:10px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* ===== CARDS ===== */
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
  margin-bottom:16px;box-shadow:var(--shadow2);
  animation:fadeUp 0.4s cubic-bezier(.2,.8,.2,1) both;
}
.cardHead{
  padding:14px 18px;font-weight:700;color:var(--text);
  border-bottom:1px solid var(--border);
  background:rgba(255,255,255,0.02);
  display:flex;justify-content:space-between;align-items:center;
  font-size:14px;
}
.cardHead .ch-badge{
  font-size:11px;color:var(--text2);font-weight:500;
}

/* ===== TABLE ===== */
.tableWrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{
  padding:10px 14px;text-align:left;
  background:rgba(255,255,255,0.03);
  font-weight:700;color:var(--text2);font-size:10px;
  border-bottom:1px solid var(--border);
  white-space:nowrap;text-transform:uppercase;letter-spacing:.5px;
}
tr{border-bottom:1px solid var(--border);transition:background 0.15s}
tr:hover{background:rgba(255,255,255,0.02)}
td{padding:11px 14px;color:var(--text);vertical-align:middle}
.empty{padding:32px;text-align:center;color:var(--text2);font-size:13px}

/* ===== BADGES ===== */
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.tag.income{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.2)}
.tag.expense{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.2)}
.tag.active{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.2)}
.tag.inactive{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.2)}
.tag.pending{background:rgba(245,158,11,0.15);color:#fbbf24;border:1px solid rgba(245,158,11,0.2)}
.tag.paid{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.2)}
.tag.loan{background:rgba(139,92,246,0.15);color:#a78bfa;border:1px solid rgba(139,92,246,0.2)}
.tag.rejected{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.2)}
.tag.approved{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.2)}

/* ===== BUTTONS ===== */
.btnSm{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#000;border:none;padding:9px 18px;border-radius:10px;
  font-weight:700;font-size:12px;font-family:'Poppins',sans-serif;
  transition:all 0.2s;letter-spacing:.3px;
}
.btnSm:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(245,158,11,0.35)}
.btnGreen{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff}
.btnGreen:hover{box-shadow:0 6px 20px rgba(34,197,94,0.35)}
.btnDanger{background:rgba(239,68,68,0.1);color:#f87171;border:1px solid rgba(239,68,68,0.2);padding:7px 14px;border-radius:8px;font-size:11px;font-weight:700;font-family:'Poppins',sans-serif;transition:all 0.2s}
.btnDanger:hover{background:rgba(239,68,68,0.2)}
.btnGhost{background:rgba(255,255,255,0.05);color:var(--text);border:1px solid var(--border);padding:9px 18px;border-radius:10px;font-weight:600;font-size:13px;font-family:'Poppins',sans-serif;transition:all 0.2s}
.btnGhost:hover{border-color:var(--gold)}
.pill{background:var(--card2);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;transition:all 0.2s;font-family:'Poppins',sans-serif}
.pill.active{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border-color:var(--gold)}
.pill:hover{border-color:var(--gold)}

/* ===== FORM CARD ===== */
.formCard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;box-shadow:var(--shadow2);animation:fadeUp 0.4s ease both}
.formGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;padding:16px}
.formActions{padding:0 16px 16px;display:flex;gap:10px;flex-wrap:wrap}

/* ===== MEMBER CARDS ===== */
.memberGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:16px}
.memberCard{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px;
  transition:all 0.3s cubic-bezier(.2,.8,.2,1);
  animation:fadeUp 0.4s ease both;position:relative;overflow:hidden;
}
.memberCard::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(245,158,11,0.03),rgba(34,197,94,0.02));
  opacity:0;transition:opacity 0.3s;pointer-events:none;
}
.memberCard:hover{transform:translateY(-4px);box-shadow:0 20px 50px rgba(0,0,0,0.6);border-color:rgba(245,158,11,0.2)}
.memberCard:hover::after{opacity:1}
.mhead{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.mavatar{width:52px;height:52px;border-radius:50%;border:2px solid var(--gold);object-fit:cover;flex-shrink:0}
.mname{font-weight:800;color:var(--text);font-size:14px}
.mmid{font-size:11px;color:var(--text2);margin-top:2px}
.mdetails{font-size:12px;color:var(--text2);line-height:2;border-top:1px solid var(--border);padding-top:12px}
.mdetails b{color:var(--text)}
.mactions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}

/* ===== LOAN CARDS ===== */
.loanCard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;animation:fadeUp 0.4s ease both;transition:all 0.3s}
.loanCard:hover{border-color:rgba(139,92,246,0.3);transform:translateY(-2px)}
.lprogress{background:var(--card2);border-radius:10px;height:6px;margin:12px 0;overflow:hidden}
.lbar{height:6px;border-radius:10px;background:linear-gradient(90deg,var(--green),var(--gold));transition:width 0.8s cubic-bezier(.2,.8,.2,1)}
.ldetails{display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:11px;color:var(--text2);margin-top:10px}
.lval{font-weight:800;color:var(--text);font-size:13px;margin-top:2px}

/* ===== CHAT ===== */
.chatWrap{display:flex;flex-direction:column;height:480px}
.chatMessages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.chatMessages::-webkit-scrollbar{width:3px}
.chatMessages::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
.chatMsg{max-width:72%;padding:10px 14px;border-radius:18px;font-size:13px;line-height:1.5;animation:fadeUp 0.2s ease}
.chatMsg.mine{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;align-self:flex-end;border-bottom-right-radius:4px;font-weight:600}
.chatMsg.theirs{background:var(--card2);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;border:1px solid var(--border)}
.chatMsg .sender{font-size:10px;font-weight:700;margin-bottom:3px;opacity:0.7}
.chatMsg .ctime{font-size:10px;opacity:0.5;margin-top:4px;text-align:right}
.chatInput{display:flex;gap:10px;padding:12px 16px;border-top:1px solid var(--border);background:var(--card)}
.chatInput input{flex:1;background:var(--card2);border:1.5px solid var(--border);border-radius:24px;padding:10px 16px;font-size:13px;color:var(--text);outline:none;font-family:'Poppins',sans-serif;transition:border 0.2s}
.chatInput input:focus{border-color:var(--gold)}
.chatInput button{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none;width:42px;height:42px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
.chatInput button:hover{transform:scale(1.1)}

/* ===== NOTIFICATIONS DROP ===== */
.notifDrop{position:absolute;right:0;top:50px;width:320px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 20px 60px rgba(0,0,0,0.6);z-index:200;overflow:hidden;max-height:420px;overflow-y:auto}
.notifDrop .head{padding:12px 16px;font-weight:800;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--text)}
.notifDrop .head button{font-size:11px;color:var(--gold);background:none;border:none;font-weight:700;font-family:'Poppins',sans-serif}
.notifItem{display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);align-items:flex-start;transition:background 0.15s}
.notifItem:hover{background:rgba(255,255,255,0.02)}
.notifItem.unread{background:rgba(245,158,11,0.04);border-left:3px solid var(--gold)}
.notifItem .nmsg{font-size:13px;color:var(--text);line-height:1.4}
.notifItem .ntime{font-size:10px;color:var(--text2);margin-top:3px}

/* ===== MODAL ===== */
.modalOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.2s ease}
.modalCard{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:480px;box-shadow:0 30px 80px rgba(0,0,0,0.8);max-height:90vh;overflow-y:auto;animation:fadeUp 0.3s cubic-bezier(.2,.8,.2,1)}
.modalCard h2{font-size:18px;font-weight:900;color:var(--gold);margin-bottom:20px}
.modalActions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;flex-wrap:wrap}

/* ===== TOAST ===== */
#toast{position:fixed;bottom:24px;right:16px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none;max-width:300px}
.toastItem{padding:12px 16px;border-radius:12px;font-weight:700;font-size:12px;box-shadow:0 8px 30px rgba(0,0,0,0.5);animation:slideIn 0.3s cubic-bezier(.2,.8,.2,1);display:flex;align-items:center;gap:8px;border:1px solid}
.toastItem.success{background:#0d1f14;border-color:rgba(34,197,94,0.4);color:#4ade80}
.toastItem.error{background:#1f0d0d;border-color:rgba(239,68,68,0.4);color:#f87171}
.toastItem.info{background:#0d1520;border-color:rgba(59,130,246,0.4);color:#93c5fd}

/* ===== DUE ALERT ===== */
.dueAlert{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px;font-size:13px;color:#f87171;font-weight:600;animation:fadeUp 0.3s ease}

/* ===== PROGRESS RING ===== */
.creditScore{text-align:center;padding:20px}
.scoreNum{font-size:48px;font-weight:900;color:var(--gold)}
.scoreLabel{font-size:12px;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:.8px}

/* ===== CHART WRAP ===== */
.chartWrap{padding:16px;height:280px;position:relative}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .sidebar{position:fixed;left:-260px;top:0;bottom:0;z-index:100;transition:left 0.3s cubic-bezier(.2,.8,.2,1);box-shadow:none}
  .sidebar.open{left:0;box-shadow:8px 0 40px rgba(0,0,0,0.8)}
  .main{width:100%}
  .statsGrid{grid-template-columns:repeat(2,1fr)}
  .formGrid{grid-template-columns:1fr}
  .memberGrid{grid-template-columns:1fr}
  .content{padding:14px}
  .chatMsg{max-width:85%}
  .topbar{padding:12px 14px}
  .menuBtn{display:flex!important}
  .notifDrop{right:-10px;width:300px}
}
.menuBtn{display:none;background:var(--card2);border:1px solid var(--border);color:var(--text);width:38px;height:38px;border-radius:10px;align-items:center;justify-content:center;font-size:18px;transition:all 0.2s}
.menuBtn:hover{border-color:var(--gold)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99}
.overlay.show{display:block;backdrop-filter:none;-webkit-backdrop-filter:none}

/* ===== PIN LOCK ===== */
#pinLock{position:fixed;inset:0;background:var(--bg);z-index:800;display:none;flex-direction:column;align-items:center;justify-content:center;gap:24px}
.pinDots{display:flex;gap:12px}
.pinDot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:all 0.2s}
.pinDot.filled{background:var(--gold);border-color:var(--gold);box-shadow:0 0 10px rgba(245,158,11,0.4)}
.pinPad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:240px}
.pinBtn{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:16px;border-radius:14px;font-size:20px;font-weight:700;font-family:'Poppins',sans-serif;transition:all 0.15s;min-width:70px}
.pinBtn:hover{border-color:var(--gold);color:var(--gold);transform:scale(1.05)}
.pinBtn:active{transform:scale(0.95)}

/* ===== ANNOUNCEMENT BOARD ===== */
.announcement{background:linear-gradient(135deg,rgba(245,158,11,0.08),rgba(34,197,94,0.04));border:1px solid rgba(245,158,11,0.2);border-radius:var(--radius);padding:16px;margin-bottom:12px;animation:fadeUp 0.3s ease}
.announcement .aTitle{font-weight:800;color:var(--gold);font-size:14px}
.announcement .aBody{font-size:13px;color:var(--text2);margin-top:6px;line-height:1.6}
.announcement .aMeta{font-size:10px;color:#555;margin-top:8px}
.pinned{border-left:4px solid var(--gold)}
.floatingChat{position:fixed;bottom:80px;right:20px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000;border:none;font-size:22px;box-shadow:0 4px 20px rgba(245,158,11,0.4);z-index:90;cursor:pointer;display:none;align-items:center;justify-content:center;}
.fCBadge{position:absolute;top:-3px;right:-3px;background:#ef4444;color:#fff;font-size:9px;font-weight:800;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;}
</style>
</head>

  ],
  months:['बैशाख','जेठ','असार','श्रावण','भाद्र','आश्विन','कार्तिक','मंसिर','पुष','माघ','फाल्गुन','चैत्र'],
  days:['आइतबार','सोमबार','मंगलबार','बुधबार','बिहिबार','शुक्रबार','शनिबार'],
  nums:['०','१','२','३','४','५','६','७','८','९'],
  toNep(n){return String(n).split('').map(d=>this.nums[parseInt(d)]||d).join('')},
  convert(adDate){
    try{
      const d=new Date(adDate);
      // Known reference: April 14, 2025 = Baisakh 1, 2082 BS
      const ref=new Date(2025,3,14);
      let days=Math.floor((d-ref)/(864e5));
      let y=2082,m=1,day=1;
      // Handle dates before reference
      if(days<0){
        // Go backwards through years
        days=Math.abs(days);
        y=2081;m=12;
        while(days>0){
          const yi=y-1999;
          if(yi<1||yi>=this.bs.length)break;
          const dim=this.bs[yi][m-1];
          if(days<=dim){day=dim-days+1;days=0;}
          else{days-=dim;m--;if(m<1){m=12;y--;}}
        }
        const dn=this.days[d.getDay()];
        return{y,m,d:day,str:this.toNep(y)+' '+this.months[m-1]+' '+this.toNep(day),day:dn};
      }
      // Forward from reference
      while(days>0){
        const yi=y-1999;
        if(yi<1||yi>=this.bs.length)break;
        const dim=this.bs[yi][m-1];
        if(days<dim){day=days+1;days=0;}
        else{days-=dim;m++;if(m>12){m=1;y++;}}
      }
      if(days===0&&day===1)day=1;
      const dn=this.days[d.getDay()];
      return{y,m,d:day,str:this.toNep(y)+' '+this.months[m-1]+' '+this.toNep(day),day:dn};
    }catch(e){return{y:2082,m:12,d:15,str:'२०८२ चैत्र १५',day:'--'};}
  }
};

function convertBStoAD(){
  const v=document.getElementById('bsInput').value.trim();
  const el=document.getElementById('adResult');
  if(!v){el.textContent='';return;}
  const p=v.split('-');
  if(p.length!==3){el.textContent='Format: YYYY-MM-DD';return;}
  const bY=parseInt(p[0]),bM=parseInt(p[1]),bD=parseInt(p[2]);
  const adY=bY-57,adM=bM-3>0?bM-3:bM+9,adYF=bM-3>0?adY+1:adY;
  el.textContent='📅 '+adYF+'-'+String(adM).padStart(2,'0')+'-'+String(bD).padStart(2,'0')+' (AD approx)';
}

function setupPin(){
  const pad=document.getElementById('pinPad');
  if(!pad)return;
  const keys=[1,2,3,4,5,6,7,8,9,'✕',0,'⌫'];
  pad.innerHTML=keys.map(k=>`<button class="pinBtn" onclick="pinKey('${k}')">${k}</button>`).join('');
}
function pinKey(k){
  if(k==='✕'){pinInput='';updatePinDots();}
  else if(k==='⌫'){pinInput=pinInput.slice(0,-1);updatePinDots();}
  else if(pinInput.length<4){pinInput+=k;updatePinDots();}
  if(pinInput.length===4) checkPin();
}
function updatePinDots(){
  for(let i=0;i<4;i++){
    const el=document.getElementById('pd'+i);
    if(el) el.classList.toggle('filled',i<pinInput.length);
  }
}
async function checkPin(){
  const saved=localStorage.getItem('appPin');
  // Load member summary using pre-loaded data
  try{
    const mS=await db.collection('users').where('role','==','member').get();
    const tbody=document.getElementById('memberSummaryBody');
    if(tbody) tbody.innerHTML=mS.docs.map(d=>{
      const m=d.data(),id=d.id;
      const ms=savs.filter(s=>s.memberId===id).reduce((a,s)=>a+(s.amount||0),0);
      const ml=loans.filter(l=>l.memberId===id&&l.status!=='paid').reduce((a,l)=>a+(l.remaining||0),0);
      const mf=fines.filter(f=>f.memberId===id&&f.status==='pending').reduce((a,f)=>a+(f.amount||0),0);
      return`<tr><td style="font-weight:700">${m.name||'—'}</td>
        <td style="color:#34d399;font-weight:700">${fmt(ms)}</td>
        <td style="color:${ml>0?'#f87171':'#4ade80'};font-weight:700">${fmt(ml)}</td>
        <td style="color:${mf>0?'#fbbf24':'#4ade80'};font-weight:700">${fmt(mf)}</td></tr>`;
    }).join('');
  }catch(e){console.log('summary err',e);}
  
  setTimeout(()=>{
    if(!saved||pinInput===saved){
      document.getElementById('pinLock').style.display='none';
      document.getElementById('pinError').textContent='';
    } else {
      document.getElementById('pinError').textContent='PIN galat cha!';
      pinInput='';updatePinDots();
    }
  },200);
}

async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  const btn=document.getElementById('loginBtn');
  const err=document.getElementById('loginErr');
  err.style.display='none';
  if(!email||!pass){showErr('Email ra password haalnuhos!');return;}
  btn.textContent='Logging in...';btn.disabled=true;
  try{await auth.signInWithEmailAndPassword(email,pass);}
  catch(e){
    let msg='Error: '+(e.code||e.message);
    if(e.code==='auth/user-not-found')msg='Email fela parena!';
    if(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential')msg='Email ya password galat cha!';
    if(e.code==='auth/invalid-email')msg='Email format milena!';
    if(e.code==='auth/too-many-requests')msg='Dherai try! 5 min pachi garnus.';
    if(e.code==='auth/network-request-failed')msg='Internet check garnus!';
    showErr(msg);btn.textContent='Login →';btn.disabled=false;
  }
}

// ====== NOTIFICATIONS ======
async function addNotif(msg,type='info',target='all'){
  // If target is 'admin', find admin users and send to each
  if(target==='admin'){
    try{
      const adminSnap=await db.collection('users').where('role','==','admin').get();
      const batch=db.batch();
      adminSnap.docs.forEach(d=>{
        const ref=db.collection('notifications').doc();
        batch.set(ref,{msg,type,target:d.id,readBy:[],createdAt:firebase.firestore.FieldValue.serverTimestamp()});
      });
      await batch.commit();
    }catch(e){
      await db.collection('notifications').add({msg,type,target:'all',readBy:[],createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    }
    return;
  }
  await db.collection('notifications').add({msg,type,target,readBy:[],createdAt:firebase.firestore.FieldValue.serverTimestamp()});
}
function listenNotifs(){
  if(!currentUser)return;
  // Listen to 'all' notifications
  const q1=db.collection('notifications').where('target','==','all').orderBy('createdAt','desc').limit(20);
  // Listen to user-specific notifications  
  const q2=db.collection('notifications').where('target','==',currentUser.uid).orderBy('createdAt','desc').limit(20);
  
  let allNotifs=[];
  let userNotifs=[];
  
  function updateUI(){
    // Merge and sort
    const seen=new Set();
    const merged=[...allNotifs,...userNotifs].filter(n=>{
      if(seen.has(n.id))return false;
      seen.add(n.id);return true;
    }).sort((a,b)=>(b.createdAt?.toMillis?.())||0-(a.createdAt?.toMillis?.())||0);
    
    const unread=merged.filter(n=>!n.readBy?.includes(currentUser.uid)).length;
    
    // Update badges
    ['notifBadge','notifBadge2'].forEach(id=>{
      const el=document.getElementById(id);
      if(el){el.textContent=unread>9?'9+':unread;el.style.display=unread>0?'flex':'none';}
    });
    const sideBadge=document.getElementById('notifSideBadge');
    if(sideBadge){sideBadge.textContent=unread>9?'9+':unread;sideBadge.style.display=unread>0?'inline-block':'none';}
    
    // Update dropdown
    const list=document.getElementById('notifDropList');
    if(list){
      list.innerHTML=merged.length===0?'<div class="empty">कुनै पनि notification छैन</div>':
        merged.slice(0,10).map(n=>`<div class="notifItem${!n.readBy?.includes(currentUser.uid)?' unread':''}">
          <span style="font-size:18px">${n.type==='success'?'✅':n.type==='warning'?'⚠️':n.type==='error'?'❌':'ℹ️'}</span>
          <div><div class="nmsg">${n.msg}</div><div class="ntime">${n.createdAt?.toDate?fmtTime(n.createdAt.toDate()):''}</div></div>
        </div>`).join('');
    }
    
    // Update notifications page if open
    if(currentPage==='notifications') renderNotifications();
  }
  
  notifUnsub=q1.onSnapshot(snap=>{
    allNotifs=snap.docs.map(d=>({id:d.id,...d.data()}));
    updateUI();
  });
  q2.onSnapshot(snap=>{
    userNotifs=snap.docs.map(d=>({id:d.id,...d.data()}));
    updateUI();
  });
}
function toggleNotif(){const d=document.getElementById('notifDrop');d.style.display=d.style.display==='none'?'block':'none';}
document.addEventListener('click',e=>{

async function markAllRead(){
  try{
    const [s1,s2]=await Promise.all([
      db.collection('notifications').where('target','==','all').get(),
      db.collection('notifications').where('target','==',currentUser.uid).get(),
    ]);
    const batch=db.batch();
    [...s1.docs,...s2.docs].forEach(d=>{
      const arr=d.data().readBy||[];
      if(!arr.includes(currentUser.uid)){
        batch.update(d.ref,{readBy:firebase.firestore.FieldValue.arrayUnion(currentUser.uid)});
      }
    });
    await batch.commit();
    const badge=document.getElementById('notifBadge');
    if(badge)badge.style.display='none';
    const sideBadge=document.getElementById('notifSideBadge');
    if(sideBadge)sideBadge.style.display='none';
  }catch(e){console.log('markAllRead error:',e);}
}

// ====== CHAT BADGE ======
function listenChatBadge(){
  try{
    if(!currentUser)return;
    const lastRead=localStorage.getItem('lastChatRead_'+currentUser.uid)||'0';
    db.collection('chat').orderBy('createdAt','desc').limit(20).onSnapshot(snap=>{
      try{
        const badge=document.getElementById('chatBadge');
        if(!badge)return;
        const unread=snap.docs.filter(d=>{
          const data=d.data();
          if(data.uid===currentUser.uid)return false;
          const t=data.createdAt?.toMillis?.();
          return t&&String(t)>lastRead;
        }).length;
        badge.textContent=unread>9?'9+':unread;
        badge.style.display=unread>0?'inline-block':'none';
        const fb2=document.getElementById('fCB');if(fb2){fb2.textContent=unread;fb2.style.display=unread>0?'flex':'none';}
      }catch(e){console.log('chat badge err',e);}
    });
  }catch(e){console.log('listenChatBadge err',e);}
}

const TX_CATS={
  income:['Membership Fee','Donation','Event Revenue','Sponsorship','Loan Repayment','Fine Collected','Bank Interest','Other Income'],
  expense:['Event Cost','Utility Bill','Salaries','Equipment','Maintenance','Office Rent','Other Expense']
};
const PAY_METHODS=['Cash','Bank Transfer','eSewa','Khalti','IME Pay','Cheque','Other'];

async function renderTransactions(){
  const c=document.getElementById('mainContent');
  const mSnap=await db.collection('users').where('role','==','member').get();
  const members=mSnap.docs.map(d=>({id:d.id,...d.data()}));
  let filter='all';
  async function load(){
    const snap=await db.collection('transactions').orderBy('date','desc').get();
    let txs=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(filter!=='all')txs=txs.filter(t=>t.type===filter);
    const inc=txs.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0);
    const exp=txs.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0);
    c.innerHTML=`
      <div class="pageTitle"><span>💳</span>Transactions</div>
      <div class="statsGrid" style="grid-template-columns:repeat(3,1fr);max-width:500px">
        <div class="statCard"><div class="sIcon">💰</div><div class="sVal" style="color:#4ade80;font-size:16px">${fmt(inc)}</div><div class="sLabel">Income</div></div>
        <div class="statCard"><div class="sIcon">📤</div><div class="sVal" style="color:#f87171;font-size:16px">${fmt(exp)}</div><div class="sLabel">Expense</div></div>
        <div class="statCard"><div class="sIcon">🏦</div><div class="sVal" style="color:var(--gold);font-size:16px">${fmt(inc-exp)}</div><div class="sLabel">Balance</div></div>
      </div>
      <div class="formCard">
        <div class="cardHead">+ New Transaction <button class="pill" onclick="let b=document.getElementById('txBody');b.style.display=b.style.display==='none'?'block':'none'">Toggle</button></div>
        <div id="txBody">
          <div class="formGrid">
            <div class="field"><label>Type</label><select id="txType" onchange="updateTxCats()"><option value="income">Income</option><option value="expense">Expense</option></select></div>
            <div class="field"><label>Category</label><select id="txCat">${TX_CATS.income.map(c=>`<option>${c}</option>`).join('')}</select></div>
            <div class="field"><label>Amount (Rs.)</label><input type="number" id="txAmt" placeholder="5000"/></div>
            <div class="field"><label>Date (AD)</label><input type="date" id="txDate" value="${todayStr()}"/></div>
            <div class="field"><label>Payment Method</label><select id="txMethod">${PAY_METHODS.map(m=>`<option>${m}</option>`).join('')}</select></div>
            <div class="field"><label>Member</label><select id="txMember"><option value="">— None —</option>${members.map(m=>`<option value="${m.id}">${m.name}</option>`).join('')}</select></div>
            <div class="field"><label>Note</label><input type="text" id="txNote" placeholder="Monthly fee..."/></div>
          </div>
          <div class="formActions"><button class="btnSm" onclick="saveTx()">Save Transaction</button></div>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
        ${['all','income','expense'].map(f=>`<button class="pill${filter===f?' active':''}" onclick="setTxFilter('${f}')">${f.charAt(0).toUpperCase()+f.slice(1)}</button>`).join('')}
        <button class="pill" onclick="exportTxPDF()" style="margin-left:auto">📄 PDF Export</button>
      </div>
      <div class="card">
        <div class="tableWrap"><table>
          <thead><tr><th>Date (BS)</th><th>Type</th><th>Category</th><th>Method</th><th>Member</th><th>Note</th><th>Amount</th><th>Del</th></tr></thead>
          <tbody>${txs.length===0?`<tr><td colspan="8" class="empty">कुनै पनि transaction छैन</td></tr>`:
            txs.map(t=>`<tr>
              <td>${NepaliDate.convert(new Date(t.date||Date.now())).str}</td>
              <td><span class="tag ${t.type}">${t.type}</span></td>
              <td>${t.category||'—'}</td>
              <td>${t.method||'Cash'}</td>
              <td>${t.memberName||'—'}</td>
              <td>${t.note||'—'}</td>
              <td style="font-weight:800;color:${t.type==='income'?'#4ade80':'#f87171'}">${fmt(t.amount)}</td>
              <td><button class="btnDanger" style="padding:4px 8px" onclick="delTx('${t.id}')">🗑</button></td>
            </tr>`).join('')}
          </tbody>
        </table></div>
      </div>`;
    window.setTxFilter=f=>{filter=f;load();};
  }
  load();
  window.updateTxCats=()=>{const type=document.getElementById('txType')?.value;const sel=document.getElementById('txCat');if(sel&&type)sel.innerHTML=TX_CATS[type].map(c=>`<option>${c}</option>`).join('');};
  window.saveTx=async()=>{
    const type=document.getElementById('txType').value;
    const cat=document.getElementById('txCat').value;
    const amt=Number(document.getElementById('txAmt').value);
    const date=document.getElementById('txDate').value;
    const method=document.getElementById('txMethod').value;
    const memberId=document.getElementById('txMember').value;
    const note=document.getElementById('txNote').value;
    if(!amt||amt<=0){toast('Amount haalnuhos!','error');return;}
    const memberName=memberId?members.find(m=>m.id===memberId)?.name||'':'';
    const bsDate=NepaliDate.convert(new Date(date)).str;
    await db.collection('transactions').add({type,category:cat,amount:amt,date,dateBS:bsDate,method,memberId,memberName,note,by:currentUser.uid,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    await addNotif(`${type==='income'?'Income':'Expense'}: ${cat} — ${fmt(amt)} (${method})`,'info','all');
    toast('Transaction add bhayo!');load();
  };
  window.delTx=async id=>{if(!confirm('Delete?'))return;await db.collection('transactions').doc(id).delete();toast('Deleted!','error');load();};
  window.exportTxPDF=async()=>{
    try{
      const {jsPDF}=window.jspdf;
      const doc=new jsPDF();
      doc.setFontSize(18);doc.text('Daju-Bhai Samuha - Transactions',15,20);
      doc.setFontSize(10);doc.text('Generated: '+new Date().toLocaleDateString(),15,30);
      const snap=await db.collection('transactions').orderBy('date','desc').get();
      const txs=snap.docs.map(d=>d.data());
      let y=40;
      doc.setFontSize(9);
      ['Date','Type','Category','Member','Amount','Method'].forEach((h,i)=>doc.text(h,[15,45,70,110,150,175][i],y));
      y+=6;doc.line(15,y,195,y);y+=4;
      txs.forEach(t=>{
        if(y>270){doc.addPage();y=20;}
        doc.text(t.date||'',15,y);
        doc.text(t.type||'',45,y);
        doc.text((t.category||'').substring(0,18),70,y);
        doc.text((t.memberName||'—').substring(0,15),110,y);
        doc.text(fmt(t.amount),150,y);
        doc.text(t.method||'Cash',175,y);
        y+=6;
      });
      doc.save('transactions.pdf');
      toast('PDF downloaded!');
    }catch(e){toast('PDF error: '+e.message,'error');}
  };
}

// ====== LOANS ======
async function renderLoans(){
  const c=document.getElementById('mainContent');
  const mSnap=await db.collection('users').where('role','==','member').get();
  const members=mSnap.docs.map(d=>({id:d.id,...d.data()}));
  async function load(){
    const snap=await db.collection('loans').get().catch(()=>({docs:[]}));
    const loans=snap.docs.map(d=>({id:d.id,...d.data()}));
    c.innerHTML=`
      <div class="pageTitle"><span>🏦</span>Loans</div>
      <div class="formCard">
        <div class="cardHead">+ New Loan</div>
        <div class="formGrid">
          <div class="field"><label>Member</label><select id="lMember"><option value="">Select member</option>${members.map(m=>`<option value="${m.id}">${m.name}</option>`).join('')}</select></div>
          <div class="field"><label>Loan Amount (Rs.)</label><input type="number" id="lAmt" placeholder="10000"/></div>
          <div class="field"><label>Interest Rate (%/month)</label><input type="number" id="lRate" placeholder="2" step="0.1"/></div>
          <div class="field"><label>Issue Date</label><input type="date" id="lDate" value="${todayStr()}"/></div>
          <div class="field"><label>Due Date</label><input type="date" id="lDue"/></div>
          <div class="field"><label>Purpose</label><input type="text" id="lNote" placeholder="Loan purpose..."/></div>
        </div>
        <div class="formActions"><button class="btnSm" onclick="saveLoan()">Save Loan</button></div>
      </div>
      <div class="memberGrid">
        ${loans.length===0?'<div class="empty">कुनै पनि loan छैन</div>':loans.map(l=>{
          const pct=l.amount>0?Math.min(100,Math.round(((l.amount-(l.remaining??l.amount))/l.amount)*100)):0;
          return`<div class="loanCard">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
              <div><div style="font-weight:800;font-size:14px;color:var(--text)">${l.memberName||'—'}</div>
              <div style="font-size:11px;color:var(--text2);margin-top:2px">${l.note||'—'}</div></div>
              <span class="tag ${l.status==='paid'?'paid':l.status==='partial'?'pending':'loan'}">${l.status||'active'}</span>
            </div>
            <div class="lprogress"><div class="lbar" style="width:${pct}%"></div></div>
            <div style="font-size:10px;color:var(--text2);margin-bottom:8px">${pct}% repaid</div>
            <div class="ldetails">
              <div><div class="sLabel">Loan</div><div class="lval">${fmt(l.amount)}</div></div>
              <div><div class="sLabel">Remaining</div><div class="lval" style="color:#f87171">${fmt(l.remaining??l.amount)}</div></div>
              <div><div class="sLabel">Interest</div><div class="lval">${l.rate||0}%/mo</div></div>
              <div><div class="sLabel">Due Date</div><div class="lval">${l.dueDate||'—'}</div></div>
            </div>
            <div style="display:flex;gap:8px;margin-top:12px">
              <button class="btnSm" style="font-size:11px;padding:6px 12px" onclick="repayLoan('${l.id}','${l.memberName||''}',${l.remaining??l.amount},'${l.memberId||''}',${l.rate||0})">💳 Repayment</button>
              <button class="btnGhost" style="font-size:11px;padding:6px 12px" onclick="viewLoanHistory('${l.id}','${l.memberName||''}')">📋 History</button>
              <button class="btnSm btnGreen" style="font-size:11px;padding:6px 12px" onclick="printLoan(${JSON.stringify(l).replace(/'/g,'')})">🖨️ Print</button>
              <button class="btnDanger" onclick="delLoan('${l.id}')">🗑</button>
            </div>
          </div>`;}).join('')}
      </div>`;
  }
  load();
  window.saveLoan=async()=>{
    const memberId=document.getElementById('lMember').value;
    const amt=Number(document.getElementById('lAmt').value);
    const rate=Number(document.getElementById('lRate').value||0);
    const date=document.getElementById('lDate').value;
    const due=document.getElementById('lDue').value;
    const note=document.getElementById('lNote').value;
    if(!memberId){toast('Member select garnus!','error');return;}
    if(!amt||amt<=0){toast('Amount haalnuhos!','error');return;}
    const memberName=members.find(m=>m.id===memberId)?.name||'';
    await db.collection('loans').add({memberId,memberName,amount:amt,remaining:amt,rate,issueDate:date,dueDate:due,note,status:'active',createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    await addNotif(`${memberName} lai ${fmt(amt)} loan diyiyo (${rate}% interest/month)`,'info',memberId);
    toast('Loan add bhayo!');load();
  };
  window.repayLoan=async(id,name,remaining,memberId,rate)=>{
    const amt=Number(prompt(`${name} le kati tiryo? (Remaining: Rs.${remaining})`));
    if(!amt||amt<=0)return;
    const method=prompt('Payment method? (Cash/eSewa/Bank/Khalti)')||'Cash';
    const interest=rate>0?Math.round(remaining*rate/100):0;
    const principal=Math.max(0,amt-interest);
    const newRem=Math.max(0,remaining-principal);
    const overpayment=amt>remaining?amt-remaining:0;
    // Update loan
    await db.collection('loans').doc(id).update({
      remaining:newRem,
      status:newRem===0?'paid':'partial',
      lastPayment:{amount:amt,date:todayStr(),dateBS:NepaliDate.convert(new Date()).str,method,interest,principal}
    });
    // Add payment to history subcollection
    await db.collection('loans').doc(id).collection('payments').add({
      amount:amt,principal,interest,method,remaining:newRem,
      date:todayStr(),dateBS:NepaliDate.convert(new Date()).str,
      by:currentUser.uid,createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    // Record transaction
    await db.collection('transactions').add({type:'income',category:'Loan Repayment',amount:amt,date:todayStr(),dateBS:NepaliDate.convert(new Date()).str,memberName:name,memberId,method,note:`Loan repayment (Principal:${fmt(principal)}, Interest:${fmt(interest)})`,by:currentUser.uid,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    // Overpayment goes to savings
    if(overpayment>0){
      await db.collection('savings').add({memberId,memberName:name,amount:overpayment,method,date:todayStr(),dateBS:NepaliDate.convert(new Date()).str,note:'Loan overpayment auto-savings',createdAt:firebase.firestore.FieldValue.serverTimestamp()});
      await addNotif(`${name} le badi tireko ${fmt(overpayment)} savings ma rakiyo!`,'success',memberId);
    }
    // Activity log
    await logActivity('loan_repayment',`${name} le ${fmt(amt)} loan tiryo. Remaining: ${fmt(newRem)}`,{loanId:id,memberId,amount:amt});
    await addNotif(`${name} le ${fmt(amt)} loan tiryo! Remaining: ${fmt(newRem)}`,'success','all');
    toast('Repayment recorded!');load();
  };
  window.delLoan=async id=>{if(!confirm('Delete?'))return;await db.collection('loans').doc(id).delete();toast('Deleted!','error');load();};
  window.printLoan=async(loan)=>{
    const printWin=window.open('','_blank');
    printWin.document.write(`<!DOCTYPE html><html><head>
      <title>Loan Document - ${loan.memberName||''}</title>
      <style>body{font-family:Arial,sans-serif;padding:40px;max-width:600px;margin:0 auto}
      h1{text-align:center;border-bottom:2px solid #000;padding-bottom:10px}
      h2{text-align:center;font-size:16px;color:#555}
      table{width:100%;border-collapse:collapse;margin-top:20px}
      td{padding:10px;border:1px solid #ddd}
      td:first-child{font-weight:bold;background:#f5f5f5;width:40%}
      .sign{display:flex;justify-content:space-between;margin-top:60px}
      .sign div{text-align:center;border-top:1px solid #000;padding-top:8px;width:40%}
      .footer{text-align:center;margin-top:40px;color:#888;font-size:12px}
      @media print{button{display:none}}</style>
    </head><body>
      <h1>🏦 दाजुभाइ समूह</h1>
      <h2>Loan Agreement Document</h2>
      <button onclick="window.print()" style="display:block;margin:10px auto;padding:10px 20px;background:#16a34a;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer">🖨️ Print Now</button>
      <table>
        <tr><td>Member Name</td><td>${loan.memberName||'—'}</td></tr>
        <tr><td>Member ID</td><td>${loan.memberId||'—'}</td></tr>
        <tr><td>Loan Amount</td><td>${fmt(loan.amount)}</td></tr>
        <tr><td>Remaining</td><td>${fmt(loan.remaining??loan.amount)}</td></tr>
        <tr><td>Interest Rate</td><td>${loan.rate||0}% per month</td></tr>
        <tr><td>Issue Date</td><td>${loan.issueDate||'—'}</td></tr>
        <tr><td>Due Date</td><td>${loan.dueDate||'—'}</td></tr>
        <tr><td>Purpose</td><td>${loan.note||'—'}</td></tr>
        <tr><td>Status</td><td>${loan.status||'active'}</td></tr>
      </table>
      <div class="sign">
        <div>Member Signature</div>
        <div>Admin Signature</div>
      </div>
      <div class="footer">Generated: ${NepaliDate.convert(new Date()).str} | Daju-Bhai Samuha - ESTD 2025 | Dhanjugaon, Bhaktapur</div>
    </body></html>`);
    printWin.document.close();
    toast('Print window opened!');
  };
}

// ====== LOAN REQUESTS (Admin) ======
async function renderLoanRequests(){
  const c=document.getElementById('mainContent');
  async function load(){
    const snap=await db.collection('loanRequests').get().catch(()=>({docs:[]}));
    snap.docs.sort((a,b)=>(b.data().date||'')>(a.data().date||'')?1:-1);
    const reqs=snap.docs.map(d=>({id:d.id,...d.data()}));
    c.innerHTML=`
      <div class="pageTitle"><span>📋</span>Loan Requests</div>
      <div class="card">
        <div class="tableWrap"><table>
          <thead><tr><th>Member</th><th>Amount</th><th>Duration</th><th>Reason</th><th>Date</th><th>Status</th><th>Action</th></tr></thead>
          <tbody>${reqs.length===0?`<tr><td colspan="7" class="empty">कुनै पनि loan request छैन</td></tr>`:
            reqs.map(r=>`<tr>
              <td>${r.memberName||'—'}</td>
              <td style="font-weight:700;color:var(--gold)">${fmt(r.amount)}</td>
              <td>${r.duration||'—'}</td>
              <td>${r.reason||'—'}</td>
              <td>${r.dateBS||r.date||'—'}</td>
              <td><span class="tag ${r.status==='approved'?'approved':r.status==='rejected'?'rejected':'pending'}">${r.status||'pending'}</span></td>
              <td style="display:flex;gap:6px">
                ${r.status==='pending'?`
                  <button class="btnSm" style="font-size:11px;padding:5px 10px" onclick="approveLoanReq('${r.id}','${r.memberId}','${r.memberName}',${r.amount})">✅ Approve</button>
                  <button class="btnDanger" style="padding:5px 8px;font-size:11px" onclick="rejectLoanReq('${r.id}','${r.memberId}','${r.memberName}')">❌ Reject</button>
                `:'—'}
              </td>
            </tr>`).join('')}
          </tbody>
        </table></div>
      </div>`;
  }
  load();
  window.approveLoanReq=async(id,memberId,memberName,amount)=>{
    const rate=prompt('Interest rate set garnus (%/month):','2')||'2';
    const due=prompt('Due date (YYYY-MM-DD):','')||'';
    await db.collection('loanRequests').doc(id).update({status:'approved',approvedAt:firebase.firestore.FieldValue.serverTimestamp()});
    await db.collection('loans').add({memberId,memberName,amount,remaining:amount,rate:Number(rate),issueDate:todayStr(),dueDate:due,note:'Loan request approved',status:'active',createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    await addNotif(`🎉 Tapaiko Rs.${amount} ko loan request approve bhayo!`,'success',memberId);
    toast(`${memberName} ko loan approved!`);load();
  };
  window.rejectLoanReq=async(id,memberId,memberName)=>{
    const reason=prompt('Rejection reason:')||'';
    await db.collection('loanRequests').doc(id).update({status:'rejected',rejectionReason:reason,rejectedAt:firebase.firestore.FieldValue.serverTimestamp()});
    await addNotif(`❌ Tapaiko loan request reject bhayo. ${reason?'Reason: '+reason:''}`,'error',memberId);
    toast(`${memberName} ko loan rejected!`,'error');load();
  };
}

        </div>

      </div>
      <div class="memberGrid">
        ${members.length===0?'<div class="empty">कुनै पनि member छैन</div>':
          members.map(m=>`<div class="memberCard">
            <div class="mhead">
              ${(m.photo&&m.photo.length>10)?`<img class="mavatar" src="${m.photo}" onerror="this.style.display='none'"/>`:
                `<div class="avatar" style="width:52px;height:52px;font-size:18px">${(m.name||'U').substring(0,2).toUpperCase()}</div>`}
              <div style="flex:1;min-width:0">
                <div class="mname">${m.name||'—'} ${m.verified?'<span style="display:inline-flex;align-items:center;gap:3px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;letter-spacing:.3px;box-shadow:0 2px 8px rgba(16,185,129,0.4)">✓ Verified</span>':''}</div>
                <div class="mmid">${m.memberId||'—'}</div>
                <span class="tag ${m.status==='inactive'?'inactive':'active'}">${m.status||'active'}</span>
              </div>
            </div>
            <div class="mdetails">
              📞 ${m.phone||'—'}<br/>
              📧 ${m.email||'—'}<br/>
              📅 Joined: ${m.joinDateNP||m.joinDate||'—'}
              ${m.birthday?`<br/>🎂 Birthday: ${m.birthday}`:''}
            </div>
            <div class="mactions">
              <button class="pill" onclick="sendAlert('${m.id}','${(m.name||'').replace(/'/g,'')}')">📢 Alert</button>
              <button class="pill" onclick="toggleStatus('${m.id}','${m.status||'active'}')">
                ${m.status==='inactive'?'▶ Activate':'⏸ Deactivate'}
              </button>
              <button class="btnDanger" onclick="removeMember('${m.id}','${(m.name||'').replace(/'/g,'')}')">🗑</button>
            </div>
          </div>`).join('')}
      </div>`;
  }
  load();

  window.addMember=async()=>{
    const name=document.getElementById('mName').value.trim();
    const email=document.getElementById('mEmail').value.trim();
    const pass=document.getElementById('mPass').value;
    const phone=document.getElementById('mPhone').value.trim();
    const memberId=document.getElementById('mId').value.trim();
    const joinBS=document.getElementById('mJoinBS').value.trim();
    const joinDate=document.getElementById('mJoin').value;
    const verified=document.getElementById('mVerified').value==='true';
    const birthday=document.getElementById('mBirthday').value;
    const photoFile=document.getElementById('mPhoto').files[0];
    if(!name||!email||!pass){toast('Name, email ra password required!','error');return;}
    if(pass.length<6){toast('Password 6+ chars chahincha!','error');return;}
    let photoBase64='';
    if(photoFile){
      photoBase64=await new Promise(res=>{
        const img=new Image();
        const reader=new FileReader();
        reader.onload=e=>{
          img.onload=()=>{
            const canvas=document.createElement('canvas');
            const max=200;let w=img.width,h=img.height;
            if(w>h){if(w>max){h=h*max/w;w=max;}}else{if(h>max){w=w*max/h;h=max;}}
            canvas.width=w;canvas.height=h;
            canvas.getContext('2d').drawImage(img,0,0,w,h);
            res(canvas.toDataURL('image/jpeg',0.7));
          };
          img.src=e.target.result;
        };
        reader.readAsDataURL(photoFile);
      });
    }
    const joinDateNP=joinBS||(joinDate?NepaliDate.convert(new Date(joinDate)).str:'');
    try{
      const secondApp=firebase.initializeApp(firebase.apps[0].options,'sec_'+Date.now());
      const secondAuth=secondApp.auth();
      const cred=await secondAuth.createUserWithEmailAndPassword(email,pass);
      const uid=cred.user.uid;
      await secondAuth.signOut();await secondApp.delete();
      await db.collection('users').doc(uid).set({name,email,phone,memberId,joinDate,joinDateNP,role:'member',status:'active',verified,photo:photoBase64,birthday,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
      await addNotif(`🎉 Namaskar ${name}! Daju-Bhai Samuha ma swagat cha!`,'success',uid);
      toast(`${name} add bhayo!`);load();
    }catch(e){
      if(e.code==='auth/email-already-in-use')toast('Email already use bhaisakeko chha!','error');
      else toast('Error: '+e.message,'error');
    }
  };

  window.sendAlert=async(id,name)=>{
    const msg=prompt(`${name} lai k message pathaunu huncha?`);
    if(!msg)return;
    await db.collection('notifications').add({msg:`📢 Admin: ${msg}`,type:'warning',target:id,readBy:[],createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    toast(`Alert ${name} lai pathaiyo!`);
  };
  window.toggleStatus=async(id,cur)=>{
    await db.collection('users').doc(id).update({status:cur==='inactive'?'active':'inactive'});
    toast('Status updated!');load();
  };
  window.removeMember=async(id,name)=>{
    if(!confirm(`${name} lai remove garnu huncha?`))return;
    await db.collection('users').doc(id).update({status:'removed',role:'removed'});
    toast(`${name} removed!`,'error');load();
  };
}

async function renderReports(){
  const isAdmin=currentUserData?.role==='admin';
  const c=document.getElementById('mainContent');
  const [txSnap,savSnap,loanSnap]=await Promise.all([
    db.collection('transactions').get(),
    db.collection('savings').get(),
    db.collection('loans').get(),
  ]);
  const txs=txSnap.docs.map(d=>d.data());
  const savs=savSnap.docs.map(d=>d.data());
  const loans=loanSnap.docs.map(d=>d.data());
  let reportPeriod=12; // default annual
  const monthly={};
  txs.forEach(t=>{const m=(t.date||'').substring(0,7);if(!m)return;if(!monthly[m]){monthly[m]={income:0,expense:0};}if(t.type==='income')monthly[m].income+=t.amount;else monthly[m].expense+=t.amount;});
  const labels=Object.keys(monthly).sort().slice(-12);
  const incomes=labels.map(m=>monthly[m].income);
  const expenses=labels.map(m=>monthly[m].expense);
  const catBreak={};
  txs.filter(t=>t.type==='expense').forEach(t=>{catBreak[t.category]=(catBreak[t.category]||0)+t.amount;});
  const totalInc=txs.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0);
  const totalExp=txs.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0);
  c.innerHTML=`
    <div class="pageTitle"><span>📈</span>Reports & Charts</div>
    <div class="statsGrid">
      <div class="statCard"><div class="sIcon">💰</div><div class="sVal" style="color:#4ade80">${fmt(totalInc)}</div><div class="sLabel">Total Income</div></div>
      <div class="statCard"><div class="sIcon">📤</div><div class="sVal" style="color:#f87171">${fmt(totalExp)}</div><div class="sLabel">Total Expense</div></div>
      <div class="statCard"><div class="sIcon">🏦</div><div class="sVal" style="color:var(--gold)">${fmt(totalInc-totalExp)}</div><div class="sLabel">Net Balance</div></div>
      <div class="statCard"><div class="sIcon">🐷</div><div class="sVal" style="color:#34d399">${fmt(savs.reduce((a,s)=>a+s.amount,0))}</div><div class="sLabel">Total Savings</div></div>
      <div class="statCard"><div class="sIcon">🏦</div><div class="sVal" style="color:#f87171">${fmt(loans.filter(l=>l.status!=='paid').reduce((a,l)=>a+(l.remaining||0),0))}</div><div class="sLabel">Loan Outstanding</div></div>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div class="cardHead">Member-wise Savings Summary</div>
      <div class="tableWrap"><table>
        <thead><tr><th>Member</th><th>Total Savings</th><th>Loan Remaining</th><th>Fines Paid</th></tr></thead>
        <tbody id="memberSummaryBody"><tr><td colspan="4" class="empty">Loading...</td></tr></tbody>
      </table></div>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
      <span style="font-size:13px;color:var(--text2);font-weight:600">Period:</span>
      ${['3 Month','6 Month','Annual'].map((p,i)=>`<button class="pill${reportPeriod===[3,6,12][i]?' active':''}" onclick="reportPeriod=${[3,6,12][i]};renderReports()">${p}</button>`).join('')}
      ${isAdmin?`<button class="btnSm" onclick="exportFullPDF()">📄 PDF Export</button>
      <button class="btnSm btnGreen" onclick="exportAllDataExcel()">📊 Excel Backup</button>`:''}
    </div>
    <div class="card"><div class="cardHead">Monthly Income vs Expense</div><div class="chartWrap"><canvas id="barChart"></canvas></div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="card"><div class="cardHead">Expense Breakdown</div><div class="chartWrap"><canvas id="pieChart"></canvas></div></div>
      <div class="card"><div class="cardHead">Income vs Expense</div><div class="chartWrap"><canvas id="doughChart"></canvas></div></div>
    </div>`;
  setTimeout(()=>{
    const cg={color:'rgba(245,158,11,0.3)',ticks:{color:'#888'}};
    new Chart(document.getElementById('barChart'),{type:'bar',data:{labels:labels.length?labels:['No data'],datasets:[{label:'Income',data:incomes,backgroundColor:'rgba(34,197,94,0.7)',borderColor:'#22c55e',borderWidth:1,borderRadius:6},{label:'Expense',data:expenses,backgroundColor:'rgba(239,68,68,0.7)',borderColor:'#ef4444',borderWidth:1,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#888'}}},scales:{x:{...cg,grid:{color:'rgba(255,255,255,0.05)'}},y:{...cg,grid:{color:'rgba(255,255,255,0.05)'},ticks:{callback:v=>'Rs.'+v.toLocaleString()}}}}});
    const catKeys=Object.keys(catBreak);
    if(catKeys.length>0)new Chart(document.getElementById('pieChart'),{type:'pie',data:{labels:catKeys,datasets:[{data:catKeys.map(k=>catBreak[k]),backgroundColor:['#ef4444','#f97316','#eab308','#22c55e','#0ea5e9','#8b5cf6','#ec4899']}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#888'}}}}});
    new Chart(document.getElementById('doughChart'),{type:'doughnut',data:{labels:['Income','Expense'],datasets:[{data:[totalInc,totalExp],backgroundColor:['rgba(34,197,94,0.8)','rgba(239,68,68,0.8)'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#888'}}}}});
  },200);
  window.exportFullPDF=async()=>{
    try{
      const {jsPDF}=window.jspdf;
      const doc=new jsPDF();
      doc.setFontSize(22);doc.text('Daju-Bhai Samuha',105,20,{align:'center'});
      doc.setFontSize(14);doc.text('Annual Financial Report',105,30,{align:'center'});
      doc.line(15,35,195,35);
      doc.setFontSize(12);
      doc.text('Summary',15,45);
      doc.setFontSize(10);
      doc.text(`Total Income: ${fmt(totalInc)}`,15,55);
      doc.text(`Total Expense: ${fmt(totalExp)}`,15,63);
      doc.text(`Net Balance: ${fmt(totalInc-totalExp)}`,15,71);
      doc.line(15,78,195,78);
      doc.text('Monthly Breakdown:',15,88);
      let y=96;
      labels.forEach(m=>{
        if(y>270){doc.addPage();y=20;}
        doc.text(`${m}  Income: ${fmt(monthly[m].income)}  Expense: ${fmt(monthly[m].expense)}`,20,y);
        y+=8;
      });
      doc.text(`Generated: ${new Date().toLocaleDateString()} | Daju-Bhai Samuha`,105,285,{align:'center'});
      doc.save('annual_report.pdf');
      toast('PDF downloaded!');
    }catch(e){toast('PDF error!','error');}
  };
}

function renderChat(){

  const c=document.getElementById('mainContent');
  c.innerHTML=`
    <div class="pageTitle"><span>💬</span>Group Chat</div>
    <div class="card">
      <div class="cardHead">Daju-Bhai Samuha Chat <span class="ch-badge">Real-time</span></div>
      <div class="chatWrap">
        <div class="chatMessages" id="chatMessages"><div class="empty">Loading...</div></div>
        <div class="chatInput">
          <input type="text" id="chatInput" placeholder="Message type garnus..." onkeydown="if(event.key==='Enter')sendChat()"/>

      </div>
    </div>`;
  db.collection('chat').orderBy('createdAt','asc').limit(60).onSnapshot(snap=>{

    box.innerHTML=msgs.length===0?'<div class="empty">कुनै पनि message छैन। Suru garnus! 👋</div>':
      msgs.map(m=>{const mine=m.uid===currentUser.uid;return`<div class="chatMsg ${mine?'mine':'theirs'}">

        ${m.type==='image'&&m.image?`<img src="${m.image}" style="max-width:180px;border-radius:8px;display:block;cursor:pointer" onclick="window.open(this.src,'_blank')"/>`:m.text||''}
        <div class="ctime">${m.createdAt?.toDate?fmtTime(m.createdAt.toDate()):''}</div>
      </div>`;}).join('');

  });

async function sendChat(){
  const input=document.getElementById('chatInput');
  const text=input?.value.trim();if(!text)return;
  input.value='';
  await db.collection('chat').add({uid:currentUser.uid,name:currentUserData?.name||'User',text,type:'text',createdAt:firebase.firestore.FieldValue.serverTimestamp()});
}

// ======= COMPRESS IMAGE =======
function compressImg(file,maxS){return new Promise(res=>{
  const img=new Image(),r=new FileReader();
  r.onload=e=>{img.onload=()=>{
    const c=document.createElement('canvas');
    let w=img.width,h=img.height;
    if(w>h){if(w>maxS){h=h*maxS/w;w=maxS;}}else{if(h>maxS){w=w*maxS/h;h=maxS;}}
    c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
    res(c.toDataURL('image/jpeg',0.7));
  };img.src=e.target.result;};r.readAsDataURL(file);
});}

// ======= QR QUICK ENTRY =======
function qrEntry(mId,mName){
  const modal=document.createElement('div');modal.className='modalOverlay';
  modal.innerHTML=`<div class="modalCard" style="max-width:320px">
    <h2>📷 Quick Entry<br/><span style="font-size:14px;color:var(--text2)">${mName}</span></h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0">
      <button class="btnSm" onclick="doQE('${mId}','${mName}','savings')" style="padding:14px;font-size:13px">🐷<br/>बचत</button>
      <button class="btnSm btnGreen" onclick="doQE('${mId}','${mName}','loan')" style="padding:14px;font-size:13px">🏦<br/>ऋण तिर्ने</button>
      <button class="btnSm" style="background:rgba(245,158,11,.15);color:var(--gold);padding:14px;font-size:13px" onclick="doQE('${mId}','${mName}','fine')">⚠️<br/>जरिवाना</button>
      <button class="btnSm" style="background:rgba(139,92,246,.15);color:#a78bfa;padding:14px;font-size:13px" onclick="doQE('${mId}','${mName}','fee')">💰<br/>शुल्क</button>
    </div>
    <div class="modalActions"><button class="btnGhost" onclick="this.closest('.modalOverlay').remove()">Close</button></div>
  </div>`;
  document.body.appendChild(modal);
  window.doQE=async(id,name,type)=>{
    const amt=Number(prompt(`${name} — ${type} रकम (रु.):`));
    if(!amt||amt<=0)return;
    const method=prompt('तरिका (Cash/eSewa/Bank):')||'Cash';
    const bsd=NepaliDate.convert(new Date()).str;
    if(type==='savings') await db.collection('savings').add({memberId:id,memberName:name,amount:amt,method,date:todayStr(),dateBS:bsd,note:'Quick Entry',createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    else if(type==='loan'){
      const ls=await db.collection('loans').where('memberId','==',id).get();
      const al=ls.docs.filter(d=>d.data().status!=='paid');
      if(al.length===0){toast('कुनै active loan छैन!','error');return;}
      const nr=Math.max(0,(al[0].data().remaining||0)-amt);
      await al[0].ref.update({remaining:nr,status:nr===0?'paid':'partial'});
    } else if(type==='fine'){
      const r=prompt('कारण:')||'Rule Violation';
      await db.collection('fines').add({memberId:id,memberName:name,amount:amt,category:'fine',reason:r,date:todayStr(),dateBS:bsd,status:'pending',createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    }
    await db.collection('transactions').add({type:'income',category:type==='savings'?'Savings':type==='loan'?'Loan Repayment':'Fee',amount:amt,date:todayStr(),dateBS:bsd,memberId:id,memberName:name,method,note:'Quick Entry',by:currentUser.uid,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    await addNotif(`${type==='savings'?'🐷':'🏦'} ${name} — ${fmt(amt)} ${type}`,'success',id);
    toast(`${name} को ${type} entry भयो!`);modal.remove();
    if(currentPage==='members')renderMembersHub();
  };
}
window.qrEntry=qrEntry;

    const d=document.getElementById('prd').value,bs=NepaliDate.convert(new Date(d)).str;
    const type=document.getElementById('prt').value;
    await db.collection('payRequests').add({memberId:currentUser.uid,memberName:currentUserData?.name||'',type,amount:amt,method:document.getElementById('prm').value,date:d,dateBS:bs,note:document.getElementById('prn').value,status:'pending',createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    const typeLabel=type==='interest'?'💹 ब्याज':type==='savings'?'🐷 बचत':type==='loan'?'🏦 ऋण':type==='fine'?'⚠️ जरिवाना':'💰 शुल्क';
    await addNotif(`💸 ${currentUserData?.name} ले ${typeLabel} ${fmt(amt)} request गरे!`,'info','admin');
    toast('अनुरोध पठाइयो!');renderPayRequest();
  };
}

// ======= LOGIN LOGS (Per Member) =======
async function renderLoginLogs(){
  const c=document.getElementById('mainContent');
  const snap=await db.collection('loginLogs').orderBy('time','desc').limit(300).get();
  const logs=snap.docs.map(d=>d.data());
  const byE={};
  logs.forEach(l=>{const k=l.email||'Unknown';if(!byE[k])byE[k]={email:k,count:0,last:null,logs:[]};byE[k].count++;if(!byE[k].last)byE[k].last=l;if(byE[k].logs.length<10)byE[k].logs.push(l);});
  c.innerHTML=`<div class="pageTitle"><span>🕐</span>Login Log</div>
    <div class="memberGrid">${Object.values(byE).map(m=>`<div class="memberCard">
      <div style="font-weight:800;color:var(--gold);margin-bottom:6px">📧 ${m.email}</div>
      <div style="font-size:12px;color:var(--text2)">${m.last?.device||'—'} | ${m.count} पटक</div>
      <div style="font-size:12px;margin-top:6px"><b>अन्तिम:</b><br/>${m.last?.dateBS||'—'}<br/>${m.last?.time?.toDate?fmtTime(m.last.time.toDate()):'—'}</div>
      <button class="pill" style="margin-top:10px;width:100%" onclick="showLH('${m.email}')">📋 इतिहास (${m.count})</button>
    </div>`).join('')}</div>`;
  window.showLH=(email)=>{
    const ml=byE[email];if(!ml)return;
    const modal=document.createElement('div');modal.className='modalOverlay';
    modal.innerHTML=`<div class="modalCard"><h2>🕐 ${email}</h2>
      <div class="tableWrap"><table><thead><tr><th>मिति (बि.सं.)</th><th>Device</th><th>समय</th></tr></thead>
      <tbody>${ml.logs.map(l=>`<tr><td style="color:var(--gold)">${l.dateBS||'—'}</td><td>${l.device||'—'}</td><td>${l.time?.toDate?fmtTime(l.time.toDate()):'—'}</td></tr>`).join('')}</tbody></table></div>
      <div class="modalActions"><button class="btnGhost" onclick="this.closest('.modalOverlay').remove()">Close</button></div>
    </div>`;
    document.body.appendChild(modal);
  };
}

// ======= CHAT WITH IMAGES =======
async function sendChatImg(){
  const file=document.getElementById('cImg')?.files[0];
  if(!file)return;
  toast('Image पठाउँदैछ...','info');
  const b64=await compressImg(file,500);
  await db.collection('chat').add({uid:currentUser.uid,name:currentUserData?.name||'User',text:'📷',image:b64,type:'image',createdAt:firebase.firestore.FieldValue.serverTimestamp()});
  const el=document.getElementById('cImg');if(el)el.value='';
  toast('Image पठाइयो!');
}
window.sendChatImg=sendChatImg;

// ======= BIRTHDAY CHECK =======
async function checkBirthdays(){
  if(currentUserData?.role!=='admin')return;
  try{
    const now=new Date();
    const today=String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
    const snap=await db.collection('users').where('role','==','member').get();
    snap.docs.forEach(d=>{const m=d.data();if(m.birthday&&m.birthday.substring(5)===today){toast(`🎂 आज ${m.name} को जन्मदिन हो!`,'info');addNotif(`🎂 आज ${m.name} को जन्मदिन हो! Happy Birthday! 🎉`,'success','all');}});
  }catch(e){}
}
</script>
